<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div>
                <div class="menu-box">MENU</div>
                <nav class="sidebar-nav">
                    {% for item in sidebar_items %}
                    <a class="nav-item" href="{{ url_for(item.endpoint) }}">
                        <span class="nav-icon">{{ item.icon }}</span>
                        <span>{{ item.name }}</span>
                    </a>
                    {% endfor %}
                </nav>
            </div>
            <div class="sidebar-footer">AO Smith • MariaDB • Flask</div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="brand-left">QuickIOT</div>
                <div class="brand-center">{{ app_name }}</div>
                <div class="brand-right">SERVEXL</div>
            </header>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
